name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Izinkan tauri-action bikin GitHub Release + upload artifacts
permissions:
  contents: write

jobs:
  # ─── Cross-platform build & release ───────────────────────────────
  publish:
    name: Publish (${{ matrix.settings.name }})
    runs-on: ${{ matrix.settings.os }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - os: macos-latest
            name: macOS Intel
            target: x86_64-apple-darwin

          - os: macos-latest
            name: macOS Silicon
            target: aarch64-apple-darwin

          - os: windows-latest
            name: Windows x64
            target: x86_64-pc-windows-msvc

          - os: ubuntu-22.04
            name: Linux x64
            target: x86_64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4

      # ── Setup toolchains ──
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # ── Linux system deps ──
      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      # ── macOS code signing (otomatis skip kalo secret gak ada) ──
      - name: Import Apple Developer certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "No Apple certificate configured, skipping signing"
            exit 0
          fi
          echo "$APPLE_CERTIFICATE" | base64 --decode > /tmp/apple.p12
          security create-keychain -p temp temp.keychain
          security default-keychain -s temp.keychain
          security unlock-keychain -p temp temp.keychain
          security import /tmp/apple.p12 \
            -k temp.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k temp temp.keychain

      # ── Install npm deps ──
      - name: Install npm deps
        run: npm ci

      # ── Build dengan Tauri ──
      - name: Build & release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "DMS Sync v__VERSION__"
          releaseBody: |
            See the assets below to download and install DMS Sync v__VERSION__.

            ## 📦 Downloads

            - **Windows:** `.msi` installer
            - **macOS Intel:** `.dmg` (x86_64)
            - **macOS Silicon:** `.dmg` (aarch64 / Apple Silicon)
            - **Linux:** `.deb` package

            ## 🚀 How to install

            ### Windows
            Download the `.msi` and run it.

            ### macOS
            Download the `.dmg`, open it, and drag DMS Sync to Applications.
            *If you see "unidentified developer", right-click > Open once to bypass Gatekeeper.*

            ### Linux (Debian/Ubuntu)
            ```bash
            sudo dpkg -i dms-sync_*.deb
            ```
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.settings.target }}
