name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macOS Intel
            target: x86_64-apple-darwin
          - os: macos-latest
            name: macOS Silicon
            target: aarch64-apple-darwin
          - os: windows-latest
            name: Windows x64
            target: x86_64-pc-windows-msvc
          - os: ubuntu-22.04
            name: Linux x64
            target: x86_64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Import Apple Developer certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "No Apple certificate configured, skipping signing"
            exit 0
          fi
          echo "$APPLE_CERTIFICATE" | base64 --decode > /tmp/apple.p12
          security create-keychain -p temp temp.keychain
          security default-keychain -s temp.keychain
          security unlock-keychain -p temp temp.keychain
          security import /tmp/apple.p12 \
            -k temp.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k temp temp.keychain

      - name: Install npm deps
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: Upload MSI (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi
          compression-level: 0

      - name: Upload NSIS (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe
          compression-level: 0

      - name: Upload DMG (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: dmg-${{ matrix.name }}
          path: src-tauri/target/release/bundle/dmg/*.dmg
          compression-level: 0

      - name: Upload DEB (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: src-tauri/target/release/bundle/deb/*.deb
          compression-level: 0

  publish:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: DMS Sync ${{ github.ref_name }}
          body: |
            ## 📦 Downloads

            ### Windows
            - **MSI Installer:** `windows-msi/DMS Sync_*.msi`
            - **NSIS Setup:** `windows-nsis/DMS Sync_*_setup.exe`

            ### macOS
            - **Intel:** `dmg-macOS Intel/*.dmg`
            - **Silicon (M1+):** `dmg-macOS Silicon/*.dmg`

            ### Linux
            - **Debian/Ubuntu:** `linux-deb/*.deb`

            ## 🚀 Cara Install

            ### Windows
            Download `.msi` atau `-setup.exe` dan jalankan.

            ### macOS
            Download `.dmg`, buka, drag ke Applications.
            *Jika muncul "unidentified developer", klik kanan > Open sekali.*

            ### Linux
            ```bash
            sudo dpkg -i dms-sync_*.deb
            ```
          files: |
            artifacts/*/*
          fail_on_unmatched_files: false
          draft: false
          prerelease: false
          generate_release_notes: true
